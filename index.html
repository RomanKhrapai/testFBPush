<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FCM Debug Tool</title>
        <style>
            body {
                font-family: sans-serif;
                padding: 20px;
                line-height: 1.6;
            }
            .form-group {
                margin-bottom: 10px;
            }
            label {
                display: block;
                font-weight: bold;
            }
            input {
                width: 100%;
                padding: 8px;
                box-sizing: border-box;
            }
            button {
                padding: 10px 20px;
                cursor: pointer;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
            }
            #token {
                word-break: break-all;
                background: #f4f4f4;
                padding: 10px;
                margin-top: 10px;
                border-left: 5px solid #007bff;
            }
            .permission-status {
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-weight: bold;
            }
            .status-granted {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
            .status-denied {
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
            .status-default {
                background-color: #fff3cd;
                color: #856404;
                border: 1px solid #ffeeba;
            }
        </style>
    </head>
    <body>
        <h2>Налаштування Firebase Project</h2>

        <div id="permission-display" class="permission-status status-default">
            <span
                >Дозвіл на сповіщення:
                <span id="status-text">Перевірка...</span></span
            >
        </div>
        <div id="config-form">
            <div class="form-group">
                <label>API Key:</label>
                <input type="text" id="apiKey" placeholder="AIzaSy..." />
            </div>
            <div class="form-group">
                <label>Auth Domain:</label>
                <input
                    type="text"
                    id="authDomain"
                    placeholder="project-id.firebaseapp.com"
                />
            </div>
            <div class="form-group">
                <label>Project ID:</label>
                <input type="text" id="projectId" placeholder="project-id" />
            </div>
            <div class="form-group">
                <label>Messaging Sender ID:</label>
                <input
                    type="text"
                    id="messagingSenderId"
                    placeholder="123456789"
                />
            </div>
            <div class="form-group">
                <label>App ID:</label>
                <input type="text" id="appId" placeholder="1:123:web:abc..." />
            </div>
            <div class="form-group">
                <label
                    >VAPID Key (Project settings-> Cloud Messaging -> Web
                    configuration -> Web Push Certificate-> Key pair):</label
                >
                <input
                    type="text"
                    id="vapidKey"
                    placeholder="B... (з налаштувань Cloud Messaging)"
                />
            </div>

            <button id="get-token-btn">Зберегти та Отримати Token</button>
        </div>

        <h3>Ваш FCM Token:</h3>
        <p id="token">Натисніть кнопку, щоб згенерувати...</p>

        <script type="module">
            import {
                initializeApp,
                deleteApp,
                getApp,
            } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
            import {
                getMessaging,
                getToken,
                onMessage,
            } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging.js";

            const fields = [
                "apiKey",
                "authDomain",
                "projectId",
                "messagingSenderId",
                "appId",
                "vapidKey",
            ];

            function updatePermissionIndicator() {
                const status = Notification.permission;
                const display = document.getElementById("permission-display");
                const text = document.getElementById("status-text");

                display.className = "permission-status";

                if (status === "granted") {
                    display.classList.add("status-granted");
                    text.innerText = "ДОЗВОЛЕНО ✅";
                } else if (status === "denied") {
                    display.classList.add("status-denied");
                    text.innerText = "ЗАБЛОКОВАНО ❌";
                } else {
                    display.classList.add("status-default");
                    text.innerText = "НЕ ЗАПИТАНО ❓";
                }
            }

            window.onload = () => {
                fields.forEach((field) => {
                    const savedValue = localStorage.getItem(field);
                    if (savedValue)
                        document.getElementById(field).value = savedValue;
                });
                updatePermissionIndicator();
            };

            async function startFirebase() {
              updatePermissionIndicator();
                const config = {};
                fields.forEach((field) => {
                    const val = document.getElementById(field).value.trim();
                    config[field] = val;
                    localStorage.setItem(field, val);
                });

                try {
                    let app;
                    try {
                        app = getApp();
                        await deleteApp(app);
                    } catch (e) {}

                    app = initializeApp(config);
                    const messaging = getMessaging(app);

                    if ("serviceWorker" in navigator) {
                        const registration =
                            await navigator.serviceWorker.register(
                                "firebase-messaging-sw.js",
                            );
                        console.log("✅ SW зареєстрований");
                    }

                    const permission = await Notification.requestPermission();
                    if (permission === "granted") {
                        const token = await getToken(messaging, {
                            vapidKey: config.vapidKey,
                        });
                        console.log("🔑 FCM Token:", token);
                        document.getElementById("token").innerText =
                            token || "Помилка: Токен порожній.";
                    } else {
                        alert("Дозвіл відхилено");
                    }

                    onMessage(messaging, (payload) => {
                        console.log("📩 Повідомлення:", payload);
                        alert(`🔔 Сповіщення: ${payload.notification.title}`);
                    });
                } catch (error) {
                    console.error("❌ Помилка:", error);
                    document.getElementById("token").innerText =
                        "Помилка: " + error.message;
                }
            }

            document
                .getElementById("get-token-btn")
                .addEventListener("click", startFirebase);
        </script>
    </body>
</html>
